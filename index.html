<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Intelligence Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; }
        .auth-box { background: #1e293b; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); margin-top: 100px; }
        input { background: #0f172a; border: 1px solid #475569; color: #fff; padding: 12px; border-radius: 6px; width: 60%; margin-right: 10px; font-size: 16px; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; }
        button:hover { background: #1d4ed8; }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #3b82f6; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-2px); background: #24344d; }
        .details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #475569; color: #cbd5e1; line-height: 1.6; }
        .badge { background: #3b82f6; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="authView" class="auth-box">
        <h2>Enter Access Key</h2>
        <p style="color: #94a3b8;">Enter decryption password to unlock your morning briefing.</p>
        <input type="password" id="passkey" placeholder="Enter password...">
        <button onclick="unlockDashboard()">Unlock</button>
        <p id="err" style="color: #ef4444; margin-top: 15px; display: none;">Invalid decryption key. Please try again.</p>
    </div>

    <div id="dashboard">
        <h1 style="border-bottom: 2px solid #3b82f6; padding-bottom: 10px;">Executive Assistant Dashboard</h1>
        <div id="contentList"></div>
    </div>
</div>

<script>
    let encryptedDataRaw = "";

    // Automatically load the encrypted file from the repository
    async function loadEncryptedAsset() {
        try {
            const resp = await fetch('encrypted_data.json');
            const json = await resp.json();
            encryptedDataRaw = json.payload;
        } catch (e) {
            console.error("Failed downloading encrypted data payload:", e);
        }
    }
    loadEncryptedAsset();

    function unlockDashboard() {
        const password = document.getElementById('passkey').value;
        const errorLabel = document.getElementById('err');
        
        try {
            // Decrypt directly inside client memory space scope
            const decryptedBytes = CryptoJS.AES.decrypt(encryptedDataRaw, password);
            const decryptedText = decryptedBytes.toString(CryptoJS.enc.Utf8);
            
            if (!decryptedText) { throw new Error("Malformed output - Bad password"); }
            
            const data = JSON.parse(decryptedText);
            renderCards(data.feed);
            
            // Toggle view visibility panels
            document.getElementById('authView').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } catch (err) {
            errorLabel.style.display = 'block';
            console.error(err);
        }
    }

    function renderCards(feedItems) {
        const container = document.getElementById('contentList');
        container.innerHTML = "";
        
        feedItems.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => toggleDetails(index);
            
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>${item.title}</h3>
                    <span class="badge">${item.source}</span>
                </div>
                <p style="color: #94a3b8; font-style: italic; margin: 5px 0;">${item.short_summary}</p>
                <div id="details-${index}" class="details">
                    <strong>Deep Technical In-Depth Summary Breakdown:</strong>
                    <p>${item.in_depth_summary}</p>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleDetails(index) {
        const detailBlock = document.getElementById(`details-${index}`);
        const currentStyle = window.getComputedStyle(detailBlock).display;
        detailBlock.style.display = currentStyle === 'none' ? 'block' : 'none';
    }
</script>
</body>
</html>
